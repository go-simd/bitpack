name: bench
on:
  push: { branches: [main, bench] }
  workflow_dispatch:
jobs:
  bench:
    runs-on: ubuntu-latest # native amd64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: grep -m1 -oE 'avx2|avx512[a-z]+' /proc/cpuinfo | sort -u | tr "\n" " "; echo
      - run: go test -run '^$' -bench 'Pack|Unpack' -benchmem -count=6 ./...
